<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>블럭 퍼즐</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- 게임 영역 -->
    <div id="play-area">

      <!-- 보드 컬럼: HUD + 보드 -->
      <div id="board-col">
        <div id="hud">
          <div class="hud-item">
            <div class="hud-label">TIME</div>
            <div id="timer-value">100</div>
          </div>
          <div class="hud-item">
            <div class="hud-label">SCORE</div>
            <div id="score-value">0</div>
          </div>
        </div>
        <div id="board"></div>
      </div>

      <!-- 슬롯 -->
      <div id="slots">
        <div class="slot" id="slot-0">
          <div class="slot-piece" id="piece-0"></div>
        </div>
        <div class="slot" id="slot-1">
          <div class="slot-piece" id="piece-1"></div>
        </div>
      </div>

    </div>

    <!-- 드래그 중 표시되는 떠있는 블럭 -->
    <div id="floating-piece"></div>

    <!-- pending 확정 버튼 (블럭 오른쪽 위에 표시) -->
    <button id="confirm-btn" class="hidden" aria-label="배치 확정">✓</button>

  </div>

  <!-- 게임오버 오버레이 -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>GAME OVER</h2>
      <div id="final-score-text" class="final-score">0점</div>
      <div id="rank-form">
        <input id="name-input" type="text" placeholder="닉네임 (최대 8자)" maxlength="8" autocomplete="off" spellcheck="false">
        <button id="submit-btn">랭킹 등록</button>
      </div>
      <div id="submit-result" class="hidden success-msg">랭킹 등록 완료!</div>
      <div class="overlay-actions">
        <button id="ranking-btn" class="btn-secondary">랭킹 보기</button>
        <button id="restart-btn" class="btn-secondary">다시 시작</button>
      </div>
    </div>
  </div>

  <!-- 랭킹 오버레이 -->
  <div id="ranking-overlay" class="overlay hidden">
    <div class="overlay-box">
      <h2>🏆 실시간 랭킹</h2>
      <div id="ranking-list"><div class="loading">불러오는 중...</div></div>
      <button id="close-ranking-btn" class="btn-secondary">닫기</button>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
